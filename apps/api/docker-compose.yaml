version: "3.8"

services:
  db:
    image: postgres:18
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: edustream_db
    ports:
      - "5432:5432"
    # Mount volume to /var/lib/postgresql/data as per Postgres 18+ best practices
    volumes:
      - pgdata:/var/lib/postgresql

  redis:
    image: redis:7
    container_name: api_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-database
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      - QDRANT_API_KEY=qdrantAPIKey
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
  qdrant_storage:
