version: "3.8"

services:
  db:
    image: postgres:18
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: edustream_db
    ports:
      - "5432:5432"
    # Mount volume to /var/lib/postgresql/data as per Postgres 18+ best practices
    volumes:
      - pgdata:/var/lib/postgresql

  redis:
    image: redis:7
    container_name: api_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
